name: Bug Report
description: Create a report to help us improve Autogex
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below to help us reproduce and fix it quickly.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I convert this ENFA to a DFA, it throws a NullPointerException...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Please provide the code or the regex used to trigger the bug.
      placeholder: |
        1. Compile regex: `new Regex("(a|b)*");`
        2. Test input: `regex.matches("ab");`
        3. See error
      render: java
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: input
    id: java_version
    attributes:
      label: Java Version
      description: What version of Java are you using? (Autogex requires Java 25+)
      placeholder: e.g., OpenJDK 25.0.1
    validations:
      required: true
  - type: input
    id: autogex_version
    attributes:
      label: Autogex Version
      description: What version of Autogex are you using?
      placeholder: e.g., 1.4.0 # x-release-please-version
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here (e.g., stack traces).