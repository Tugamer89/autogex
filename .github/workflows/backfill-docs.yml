name: Backfill Old Documentation

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build documentation for (e.g. v1.2.0)'
        required: true

permissions:
  contents: write
  pages: write

jobs:
  backfill:
    name: Build & Deploy Old Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code at Tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name }}

      - name: JDK 25 Set Up
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Extract Clean Version
        id: version
        run: |
          TAG=${{ github.event.inputs.tag_name }}
          CLEAN_VER=${TAG#v}
          echo "VERSION=$CLEAN_VER" >> $GITHUB_ENV

      - name: Javadoc HTML Generation
        run: mvn -B javadoc:javadoc

      - name: Find Javadoc Folder
        id: find_folder
        run: |
          FOLDER=$(find target -name "apidocs" -type d | head -n 1)
          echo "javadoc_path=$FOLDER" >> $GITHUB_OUTPUT

      - name: Inject Meta Tags
        run: |
          sed -i '/<meta name="description"/d' ${{ steps.find_folder.outputs.javadoc_path }}/index.html
          sed -i '/<head>/a <link rel="icon" type="image/svg+xml" href="/favicon.svg"> <meta name="robots" content="noindex, nofollow">' ${{ steps.find_folder.outputs.javadoc_path }}/index.html
          sed -i '/id="autogex-heading"/d' ${{ steps.find_folder.outputs.javadoc_path }}/index.html

      - name: Deploy Docs to Version Folder
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.find_folder.outputs.javadoc_path }}
          destination_dir: ${{ env.VERSION }}
          keep_files: true
