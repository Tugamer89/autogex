name: Backfill Old Documentation

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag (es. v1.2.0). Lascia vuoto per rigenerare TUTTI i tag.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  setup-tags:
    name: Determine Tags to Process
    runs-on: ubuntu-latest
    outputs:
      matrix_tags: ${{ steps.get-tags.outputs.tags }}
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Tags List
        id: get-tags
        run: |
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "tags=[\"${{ github.event.inputs.tag_name }}\"]" >> $GITHUB_OUTPUT
          else
            TAGS=$(git tag -l "v*" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "tags=$TAGS" >> $GITHUB_OUTPUT
          fi

  backfill:
    name: Build & Deploy (${{ matrix.tag }})
    needs: setup-tags
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.setup-tags.outputs.matrix_tags) }}
        
    steps:
      - name: Checkout Code at Tag
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.tag }}

      - name: JDK 25 Set Up
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Extract Clean Version
        id: version
        run: |
          TAG=${{ matrix.tag }}
          CLEAN_VER=${TAG#v}
          echo "VERSION=$CLEAN_VER" >> $GITHUB_ENV

      - name: Javadoc HTML Generation
        run: mvn -B javadoc:javadoc

      - name: Find Javadoc Folder
        id: find_folder
        run: |
          FOLDER=$(find target -name "apidocs" -type d | head -n 1)
          echo "javadoc_path=$FOLDER" >> $GITHUB_OUTPUT

      - name: Inject Meta Tags & Fixes
        run: |
          sed -i '/<meta name="description"/d' ${{ steps.find_folder.outputs.javadoc_path }}/index.html
          sed -i '/id="autogex-heading"/d' ${{ steps.find_folder.outputs.javadoc_path }}/index.html
          
          sed -i '/<head>/a <meta name="robots" content="noindex, nofollow"> <meta name="description" content="Autogex Old Documentation." />' ${{ steps.find_folder.outputs.javadoc_path }}/index.html
          find ${{ steps.find_folder.outputs.javadoc_path }} -name "*.html" -exec sed -i '/<head>/a <link rel="icon" type="image/svg+xml" href="/favicon.svg">' {} +
          touch ${{ steps.find_folder.outputs.javadoc_path }}/.nojekyll

      - name: Deploy Docs to Version Folder
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.find_folder.outputs.javadoc_path }}
          destination_dir: ${{ env.VERSION }}
          keep_files: true

  trigger-sitemap:
    name: Trigger Global Sitemap
    needs: backfill
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Trigger Sitemap Update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run sitemap.yml --ref main
