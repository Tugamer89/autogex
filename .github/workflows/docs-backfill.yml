name: Docs - Backfill Old Versions

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g., v1.2.0). Leave blank to backfill all available tags starting from 1.0.'
        required: false
        type: string

jobs:
  setup-tags:
    name: Util - Determine Tags to Process
    runs-on: ubuntu-latest
    outputs:
      matrix_tags: ${{ steps.get-tags.outputs.tags }}
      has_tags: ${{ steps.get-tags.outputs.has_tags }}
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate Tags List
        id: get-tags
        run: |
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "tags=[\"${{ github.event.inputs.tag_name }}\"]" >> $GITHUB_OUTPUT
            echo "has_tags=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          RAW_TAGS=$(git tag -l --sort=v:refname "v*" | grep -E '^v[1-9]' || true)
          
          echo "--- LOCAL TAGS FOUND ---"
          echo "$RAW_TAGS"
          echo "--------------------------"
          
          if [ -z "$RAW_TAGS" ]; then
            echo "No valid tag. The next job will be skipped."
            echo "tags=[]" >> $GITHUB_OUTPUT
            echo "has_tags=false" >> $GITHUB_OUTPUT
          else
            JSON_ARRAY="["
            FIRST=true
            for t in $RAW_TAGS; do
              if [ "$FIRST" = true ]; then
                JSON_ARRAY="$JSON_ARRAY\"$t\""
                FIRST=false
              else
                JSON_ARRAY="$JSON_ARRAY, \"$t\""
              fi
            done
            JSON_ARRAY="$JSON_ARRAY]"
            
            echo "JSON fro the Matrix: $JSON_ARRAY"
            echo "tags=$JSON_ARRAY" >> $GITHUB_OUTPUT
            echo "has_tags=true" >> $GITHUB_OUTPUT
          fi

  backfill:
    name: Docs - Build and Deploy Old Versions (${{ matrix.tag }})
    needs: setup-tags
    runs-on: ubuntu-latest
    if: needs.setup-tags.outputs.has_tags == 'true'
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      VERSION: ""
      DOCS_VERSION: ""
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.setup-tags.outputs.matrix_tags) }}
        
    steps:
      - name: Checkout Repository at Tag
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.tag }}

      - name: Setup Java Environment
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Identify Project Version from Tag
        id: version
        run: |
          TAG=${{ matrix.tag }}
          CLEAN_VER=${TAG#v}
          MINOR_VER=$(echo $CLEAN_VER | cut -d. -f1,2)
          echo "VERSION=$CLEAN_VER" >> $GITHUB_ENV
          echo "DOCS_VERSION=$MINOR_VER.x" >> $GITHUB_ENV

      - name: Generate Javadoc Documentation
        run: mvn -B -T 1C compile javadoc:javadoc

      - name: Locate Generated Documentation
        id: find_folder
        run: |
          FOLDER=$(find target -name "apidocs" -type d | head -n 1)
          echo "javadoc_path=$FOLDER" >> $GITHUB_OUTPUT

      - name: Apply SEO Enhancements
        run: |
          sed -i \
            -e '/<meta name="description"/d' \
            -e '/id="autogex-heading"/d' \
            -e '/<head>/a <meta name="robots" content="noindex, nofollow">\n<meta name="description" content="Autogex Old Documentation." />' \
            ${{ steps.find_folder.outputs.javadoc_path }}/index.html

          find ${{ steps.find_folder.outputs.javadoc_path }} -name "*.html" -exec \
            sed -i '/<head>/a <link rel="icon" type="image/svg+xml" href="/favicon.svg">' {} +

      - name: Optimize Documentation Assets
        continue-on-error: true
        run: |
          npm install -g --no-audit --no-fund --ignore-scripts clean-css-cli html-minifier
          cleancss -O3 -o ${{ steps.find_folder.outputs.javadoc_path }}/resource-files/custom-javadoc.css ${{ steps.find_folder.outputs.javadoc_path }}/resource-files/custom-javadoc.css || true
          find ${{ steps.find_folder.outputs.javadoc_path }} -name "*.html" -exec html-minifier --collapse-whitespace --conservative-collapse --remove-comments --minify-js true --minify-css true -o {} {} \; || true

      - name: Publish Versioned Documentation to Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.find_folder.outputs.javadoc_path }}
          destination_dir: ${{ env.DOCS_VERSION }}
          keep_files: true

  trigger-sitemap:
    name: Util - Trigger Sitemap Update
    needs: backfill
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Trigger Sitemap Update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run docs-sitemap.yml --ref main