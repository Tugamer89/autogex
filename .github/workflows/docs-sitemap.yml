name: Docs - Generate Sitemap

on:
  push:
    branches:
      - gh-pages
    paths:
      - '**/*.html'
  workflow_dispatch: {}

jobs:
  build-sitemap:
    name: Docs - Generate and Push Sitemap
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout gh-pages Branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Generate Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://autogex.eu.org/
          additional-extensions: html

      - name: Commit and Push Sitemap
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "Auto-generated global sitemap" || exit 0
          git push

      - name: Notify IndexNow
        run: |
          curl -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "autogex.eu.org",
              "key": "8c8a09117f884afb9d9769c48698cf19",
              "keyLocation": "https://autogex.eu.org/8c8a09117f884afb9d9769c48698cf19.txt",
              "urlList": [
                "https://autogex.eu.org/",
                "https://autogex.eu.org/sitemap.xml"
              ]
            }'