name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Release Token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}
        
      - name: Sync pom.xml version
        if: ${{ steps.release.outputs.pr }}
        run: |
          PR_DATA='${{ steps.release.outputs.pr }}'
          BRANCH=$(echo $PR_DATA | jq -r '.headBranchName')
          VERSION=$(echo $PR_DATA | jq -r '.version')
          
          git checkout $BRANCH
          
          sed -i "0,/<version>/ s|<version>[^<]*</version>|<version>${VERSION}</version>|" pom.xml
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore: sync pom.xml version to ${VERSION}" || echo "No changes to commit"
          git push origin $BRANCH

      - name: Rename GitHub Release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh release edit ${{ steps.release.outputs.tag_name }} --title "Autogex v${{ steps.release.outputs.version }}"
