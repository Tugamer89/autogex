name: Release Artifacts & Publish Package

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  pages: write
  actions: write

jobs:
  publish-and-release:
    name: Build, Test, Publish and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Extract Version
        id: meta
        run: |
          TAG_NAME=${{ github.ref_name }}
          VERSION=${TAG_NAME#v}
          MINOR_VERSION=$(echo $VERSION | cut -d. -f1,2)
          echo "PROJECT_VERSION=$VERSION" >> $GITHUB_ENV
          echo "DOCS_VERSION=$MINOR_VERSION.x" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Prepare Release Body
        run: |
          cat <<EOF > release_notes.md
          **Autogex** - A powerful Java engine for processing Finite State Automata and Regular Expressions.

          ### Maven Central
          This release is officially published on Maven Central. To use it, add the following dependency to your \`pom.xml\`:
          \`\`\`xml
          <dependency>
              <groupId>org.eu.autogex</groupId>
              <artifactId>autogex</artifactId>
              <version>${{ env.PROJECT_VERSION }}</version>
          </dependency>
          \`\`\`

          **Security**: The \`.jar\` files attached to this release include a provenance attestation (SLSA Level 3) and are GPG signed.
          EOF

      - name: Publish to Maven Central
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B deploy -DskipTests

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'target/*.jar'

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          body_path: release_notes.md
          files: target/*.jar
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Javadoc HTML Generation
        run: mvn -B -T 1C compile javadoc:javadoc

      - name: Find Javadoc Folder
        id: find_folder
        run: |
          FOLDER=$(find target -name "apidocs" -type d | head -n 1)
          echo "javadoc_path=$FOLDER" >> $GITHUB_OUTPUT

      - name: Inject Meta Tags & SEO Fixes
        run: |
          sed -i \
            -e '/<meta name="description"/d' \
            -e '/id="autogex-heading"/d' \
            -e '/<head>/a <meta name="description" content="Autogex: A powerful Java engine for processing Finite State Automata and Regular Expressions. Convert Regex to minimal DFA easily." />\n<link rel="canonical" href="https://autogex.eu.org/" />' \
            ${{ steps.find_folder.outputs.javadoc_path }}/index.html

          find ${{ steps.find_folder.outputs.javadoc_path }} -name "*.html" -exec \
            sed -i '/<head>/a <link rel="icon" type="image/svg+xml" href="/favicon.svg">' {} +

      - name: Minify Frontend Assets (CSS, HTML)
        run: |
          npm install -g --no-audit --no-fund --ignore-scripts clean-css-cli html-minifier terser svgo
          cleancss -O3 -o ${{ steps.find_folder.outputs.javadoc_path }}/resource-files/custom-javadoc.css ${{ steps.find_folder.outputs.javadoc_path }}/resource-files/custom-javadoc.css
          find ${{ steps.find_folder.outputs.javadoc_path }} -name "*.html" -exec html-minifier --collapse-whitespace --conservative-collapse --remove-comments --minify-js true --minify-css true -o {} {} \;

      - name: Deploy Docs to Version Folder
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.find_folder.outputs.javadoc_path }}
          destination_dir: ${{ env.DOCS_VERSION }}
          keep_files: true
      
      - name: Copy SEO Files
        run: |
          cp src/main/javadoc/robots.txt ${{ steps.find_folder.outputs.javadoc_path }}/
          cp src/main/javadoc/8c8a09117f884afb9d9769c48698cf19.txt ${{ steps.find_folder.outputs.javadoc_path }}/
          cp src/main/javadoc/logo.svg ${{ steps.find_folder.outputs.javadoc_path }}/
          cp src/main/javadoc/favicon.svg ${{ steps.find_folder.outputs.javadoc_path }}/
          cp src/main/javadoc/version-switcher.js ${{ steps.find_folder.outputs.javadoc_path }}/
      
      - name: Minify Frontend Assets (JS, SVG)
        run: |
          terser ${{ steps.find_folder.outputs.javadoc_path }}/version-switcher.js -o ${{ steps.find_folder.outputs.javadoc_path }}/version-switcher.js -c -m
          svgo ${{ steps.find_folder.outputs.javadoc_path }}/logo.svg
          svgo ${{ steps.find_folder.outputs.javadoc_path }}/favicon.svg

      - name: Deploy Docs to Root (Latest)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.find_folder.outputs.javadoc_path }}
          destination_dir: .
          keep_files: true

  trigger-sitemap:
    name: Trigger Global Sitemap
    needs: publish-and-release
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Trigger Sitemap Update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run sitemap.yml --ref main
