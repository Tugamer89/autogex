name: Generate Global Sitemap

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Generate Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://autogex.eu.org/
          additional-extensions: html

      - name: Commit and Push Sitemap
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "Auto-generated global sitemap" || exit 0
          git push

      - name: Notify IndexNow
        run: |
          curl -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "autogex.eu.org",
              "key": "8c8a09117f884afb9d9769c48698cf19",
              "keyLocation": "https://autogex.eu.org/8c8a09117f884afb9d9769c48698cf19.txt",
              "urlList": [
                "https://autogex.eu.org/",
                "https://autogex.eu.org/sitemap.xml"
              ]
            }'
